name: lakehouse
services:
    # ---------- Kafka-compatible brocker (Redpanda) ----------
    redpanda:
        image: redpandadata/redpanda:latest
        command:
            - redpanda
            - start
            - --overprovisioned
            - --smp
            - "1"
            - --memory
            - "1G"
            - --reserve-memory
            - "0M"
            - --node-id
            - "0"
            - --check=false
            - --kafka-addr
            - 0.0.0.0:9092
            - --advertise-kafka-addr
            - redpanda:9092
            - --pandaproxy-addr
            - 0.0.0.0:8082
            - --advertise-pandaproxy-addr
            - redpanda:8082
        ports:
            - "9092:9092"   # Kafka API
            - "9644:9644"   # Admin API
            - "8082:8082"   # Pandaproxy
        volumes:
            - redpanda-data:/var/lib/redpanda/data
        networks: [lakehouse-net]
        restart: unless-stopped

    redpanda-console:     
        image: redpandadata/console:latest
        depends_on: [redpanda]
        environment:
            - KAFKA_BROKERS=redpanda:9092
        ports:
            - "8080:8080"   # Console UI
        networks: [lakehouse-net]
        restart: unless-stopped

    # ------------ MinIO (S3-compatible object storage) -------------
    minio:
        image: minio/minio:latest
        command: server /data --console-address ":9001"
        env_file:
            - .env
        environment:
            - MINIO_ROOT_USER=${MINIO_ROOT_USER}
            - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
        ports:
            - "9000:9000"   # S3 API
            - "9001:9001"   # MinIO Console
        volumes:
            - minio-data:/data
        networks: [lakehouse-net]
        restart: unless-stopped

    # ----------  PostgreSQL (DW/BI mart) -----------
    postgres:
        image: postgres:15
        env_file:
            - .env
        environment:
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
        ports:
            - "5432:5432"
        volumes:
            - pg-data:/var/lib/postgresql/data
        networks: [lakehouse-net]
        restart: unless-stopped
    
    # ----------- Spark (Master + Worker) ------------
    spark-master:
        image: bitnami/spark:3.5
        environment:
            - SPARK_MODE=master
            - SPARK_NO_DAEMONIZE=true
        ports:
            - "7077:7077"   # Spark Master RPC
            - "8088:8088"   # Spark Master UI (container 8080 -> host 8088)
        volumes:
            - spark-apps:/opt/bitnami/spark/app
            - spark-logs:/opt/bitnami/spark/logs
        networks: [lakehouse-net]
        restart: unless-stopped

    spark-worker-1:
        image: bitnami/spark:3.5
        depends_on: [spark-master]
        environment:
            - SPARK_MODE=worker
            - SPARK_MASTER_URL=spark://spark-master:7077
            - SPARK_WORKER_MEMORY=2G
            - SPARK_WORKER_CORES=1
            - SPARK_NO_DAEMONIZE=true
        volumes:
            - spark-logs:/opt/bitnami/spark/logs
        networks: [lakehouse-net]
        restart: unless-stopped

    # -------------- Airflow (dev/standalone) ---------------
    airflow:
        image: apache/airflow:2.8.3-python3.11
        command: bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com && airflow standalone"
        environment:
            - AIRFLOW__CORE__LOAD__EXAMPLES=False
            - _PIP_ADDITIONAL_REQUIRMENTS=
        ports:
            - "8085:8080"   # Airflow Web UI
        volumes:
            - ../orchestration/dags:/opt/airflow/dags
            - ../orchestration/logs:/opt/airflow/logs
            - ../orchestration/plugins:/opt/airflow/plugins
        networks: [lakehouse-net]
        restart: unless-stopped

    # ----------------- Grafana (observability UI) --------------
    grafana:
        image: grafana/grafana:10.0.12
        ports:
            - "3000:3000"   # Grafana UI
        volumes:
            - grafana-data:/var/lib/grafana
        networks: [lakehouse-net]
        restart: unless-stopped

networks:
    lakehouse-net:

volumes:
    redpanda-data:
    minio-data:
    pg-data:
    spark-apps:
    spark-logs:
    grafana-data:                                    




                            



